name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nebulous-nova
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nebulous-nova/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYSTEMTRADE_C9D0B }}
          channelId: live
          projectId: systemtrade-c9d0b
          entryPoint: ./nebulous-nova

      - name: Request Google Search indexing
        continue-on-error: true
        env:
          GSC_INDEXING_SERVICE_ACCOUNT: ${{ secrets.GSC_INDEXING_SERVICE_ACCOUNT }}
        run: node scripts/request-indexing.mjs
